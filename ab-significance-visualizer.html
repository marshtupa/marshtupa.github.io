<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Визуальный калькулятор статистической значимости для A/B</title>
  <style>
    :root {
      --bg-1: #f6efe3;
      --bg-2: #dff1f0;
      --card: rgba(255, 255, 255, 0.86);
      --text: #122028;
      --muted: #52616a;
      --line: rgba(18, 32, 40, 0.16);
      --a: #1b7f8e;
      --a-soft: rgba(27, 127, 142, 0.26);
      --b: #dd7a2f;
      --b-soft: rgba(221, 122, 47, 0.24);
      --d: #0f5f52;
      --d-soft: rgba(15, 95, 82, 0.25);
      --danger: #c4462f;
      --ok: #0e755b;
      --shadow: 0 20px 55px rgba(17, 35, 38, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Gill Sans", "Trebuchet MS", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1100px 600px at 90% -10%, rgba(201, 156, 65, 0.22), transparent 65%),
        radial-gradient(1000px 700px at -20% 20%, rgba(40, 128, 146, 0.26), transparent 65%),
        linear-gradient(120deg, var(--bg-1), var(--bg-2));
      padding: 24px;
    }

    .app {
      max-width: 1180px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .hero,
    .controls,
    .stats,
    .panel {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .hero {
      padding: 14px 18px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.25rem, 1rem + 1.2vw, 2rem);
      letter-spacing: 0.02em;
    }

    .controls {
      padding: 12px;
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .control {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(18, 32, 40, 0.1);
      border-radius: 14px;
      padding: 8px 10px;
      display: grid;
      gap: 6px;
      align-content: start;
    }

    .control label {
      font-size: 0.86rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .control .row {
      display: grid;
      grid-template-columns: 1fr 116px;
      gap: 8px;
      align-items: center;
    }

    .control .row.single {
      grid-template-columns: 1fr;
    }

    .control input[type="range"] {
      width: 100%;
      accent-color: var(--a);
      cursor: ew-resize;
    }

    .control input[type="number"],
    .control select {
      width: 100%;
      border: 1px solid rgba(18, 32, 40, 0.2);
      border-radius: 10px;
      padding: 7px 9px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    .stats {
      padding: 14px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(18, 32, 40, 0.08);
      border-radius: 14px;
      padding: 12px;
      display: grid;
      gap: 6px;
      align-content: start;
    }

    .stat h3 {
      margin: 0;
      font-size: 0.94rem;
      letter-spacing: 0.02em;
    }

    .mono {
      font-family: "SF Mono", "Menlo", "Cascadia Mono", monospace;
    }

    .main {
      font-size: 1.08rem;
      font-weight: 700;
    }

    .muted {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .panel {
      padding: 14px;
      display: grid;
      gap: 8px;
    }

    .panel h2 {
      margin: 0;
      font-size: 1.02rem;
      letter-spacing: 0.02em;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 0.87rem;
    }

    .dot {
      display: inline-flex;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      margin-right: 6px;
    }

    .dot.a { background: var(--a); }
    .dot.b { background: var(--b); }
    .dot.d { background: var(--d); }
    .dot.zero { background: var(--danger); }

    canvas {
      width: 100%;
      height: 320px;
      border: 1px solid rgba(18, 32, 40, 0.12);
      border-radius: 12px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.8), rgba(249, 251, 251, 0.9));
    }

    .explanation {
      border: 1px dashed rgba(18, 32, 40, 0.22);
      border-radius: 10px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.68);
      line-height: 1.42;
    }

    .explanation p {
      margin: 0 0 6px;
    }

    .explanation p:last-child {
      margin-bottom: 0;
    }

    .status {
      font-weight: 700;
    }

    .status.ok {
      color: var(--ok);
    }

    .status.bad {
      color: var(--danger);
    }

    @media (max-width: 980px) {
      .controls {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .stats {
        grid-template-columns: 1fr;
      }

      canvas {
        height: 280px;
      }
    }

    @media (max-width: 760px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .control .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <script>
    window.MathJax = {
      tex: { inlineMath: [["\\(", "\\)"], ["$", "$"]] },
      chtml: { scale: 0.96 },
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>Визуальный калькулятор статистической значимости для A/B</h1>
    </section>

    <section class="controls">

      <div class="control">
        <label for="n1Range">Размер выборки A, n</label>
        <div class="row">
          <input id="n1Range" type="range" min="100" max="1000000" step="100" value="10000" />
          <input id="n1Number" type="number" min="100" max="1000000" step="100" value="10000" />
        </div>
      </div>

      <div class="control">
        <label for="p1Range">Конверсия A, %</label>
        <div class="row">
          <input id="p1Range" type="range" min="0" max="100" step="0.01" value="5" />
          <input id="p1Number" type="number" min="0" max="100" step="0.01" value="5" />
        </div>
      </div>

      <div class="control">
        <label for="inferenceMode">Режим проверки H0</label>
        <div class="row single">
          <select id="inferenceMode">
            <option value="ci" selected>CI-интервал разницы</option>
            <option value="ztest">Z-тест с p-value</option>
          </select>
        </div>
      </div>

      <div class="control">
        <label for="n2Range">Размер выборки B, n</label>
        <div class="row">
          <input id="n2Range" type="range" min="100" max="1000000" step="100" value="10000" />
          <input id="n2Number" type="number" min="100" max="1000000" step="100" value="10000" />
        </div>
      </div>

      <div class="control">
        <label for="p2Range">Конверсия B, %</label>
        <div class="row">
          <input id="p2Range" type="range" min="0" max="100" step="0.01" value="6" />
          <input id="p2Number" type="number" min="0" max="100" step="0.01" value="6" />
        </div>
      </div>

      <div class="control">
        <label for="confidence">Уровень доверия</label>
        <div class="row single">
          <select id="confidence">
            <option value="90">90%</option>
            <option value="95" selected>95%</option>
            <option value="99">99%</option>
          </select>
        </div>
      </div>
    </section>

    <section class="stats">
      <article class="stat">
        <h3>Группа A</h3>
        <div id="meanA" class="main mono"></div>
        <div id="ciA" class="mono"></div>
        <div id="sampleA" class="muted"></div>
      </article>

      <article class="stat">
        <h3>Группа B</h3>
        <div id="meanB" class="main mono"></div>
        <div id="ciB" class="mono"></div>
        <div id="sampleB" class="muted"></div>
      </article>

      <article class="stat">
        <h3>Разница A - B</h3>
        <div id="diffValue" class="main mono"></div>
        <div id="ciDiff" class="mono"></div>
        <div id="zAndP" class="muted mono"></div>
      </article>

      <article class="stat">
        <h3>Гипотеза H0: (A - B) = 0</h3>
        <div id="hypothesis" class="main status"></div>
        <div id="hypothesisText" class="muted"></div>
      </article>
    </section>

    <section class="panel">
      <h2>Распределения конверсии A и B</h2>
      <div class="legend">
        <span><span class="dot a"></span><span id="convLegendAText">кривая A + 95% CI</span></span>
        <span><span class="dot b"></span><span id="convLegendBText">кривая B + 95% CI</span></span>
      </div>
      <canvas id="conversionsChart"></canvas>
    </section>

    <section class="panel">
      <h2 id="differenceTitle">Распределение разницы (A - B)</h2>
      <div class="legend">
        <span><span class="dot d"></span><span id="differenceLegendPrimary">кривая разницы + 95% CI</span></span>
        <span><span class="dot zero"></span><span id="differenceLegendSecondary">линия нуля</span></span>
      </div>
      <canvas id="differenceChart"></canvas>
      <div id="differenceExplanation" class="explanation muted"></div>
    </section>

  </main>

  <script>
    const Z_BY_CONF = {
      90: 1.6448536269514722,
      95: 1.959963984540054,
      99: 2.5758293035489004,
    };
    const CONF_LEVELS = [90, 95, 99];
    const ALPHA_LEVELS = [0.1, 0.05, 0.01];
    const MODE_CI = "ci";
    const MODE_Z_TEST = "ztest";

    const state = {
      p1: 5,
      n1: 10000,
      p2: 6,
      n2: 10000,
      confidence: 95,
      alpha: 0.05,
      mode: MODE_CI,
    };

    const ui = {
      p1Range: document.getElementById("p1Range"),
      p1Number: document.getElementById("p1Number"),
      n1Range: document.getElementById("n1Range"),
      n1Number: document.getElementById("n1Number"),
      p2Range: document.getElementById("p2Range"),
      p2Number: document.getElementById("p2Number"),
      n2Range: document.getElementById("n2Range"),
      n2Number: document.getElementById("n2Number"),
      confidenceLabel: document.querySelector('label[for="confidence"]'),
      confidence: document.getElementById("confidence"),
      inferenceMode: document.getElementById("inferenceMode"),
      meanA: document.getElementById("meanA"),
      ciA: document.getElementById("ciA"),
      sampleA: document.getElementById("sampleA"),
      meanB: document.getElementById("meanB"),
      ciB: document.getElementById("ciB"),
      sampleB: document.getElementById("sampleB"),
      diffValue: document.getElementById("diffValue"),
      ciDiff: document.getElementById("ciDiff"),
      zAndP: document.getElementById("zAndP"),
      hypothesis: document.getElementById("hypothesis"),
      hypothesisText: document.getElementById("hypothesisText"),
      convLegendAText: document.getElementById("convLegendAText"),
      convLegendBText: document.getElementById("convLegendBText"),
      differenceTitle: document.getElementById("differenceTitle"),
      differenceLegendPrimary: document.getElementById("differenceLegendPrimary"),
      differenceLegendSecondary: document.getElementById("differenceLegendSecondary"),
      differenceExplanation: document.getElementById("differenceExplanation"),
      conversionsChart: document.getElementById("conversionsChart"),
      differenceChart: document.getElementById("differenceChart"),
    };

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function normalPdf(x, mean, sigma) {
      if (sigma <= 0) return 0;
      const z = (x - mean) / sigma;
      return Math.exp(-0.5 * z * z) / (sigma * Math.sqrt(2 * Math.PI));
    }

    function erf(x) {
      const sign = x >= 0 ? 1 : -1;
      const absX = Math.abs(x);
      const a1 = 0.254829592;
      const a2 = -0.284496736;
      const a3 = 1.421413741;
      const a4 = -1.453152027;
      const a5 = 1.061405429;
      const p = 0.3275911;

      const t = 1 / (1 + p * absX);
      const y = 1 - (((((a5 * t + a4) * t + a3) * t + a2) * t + a1) * t) * Math.exp(-absX * absX);
      return sign * y;
    }

    function normalCdf(x) {
      return 0.5 * (1 + erf(x / Math.SQRT2));
    }

    function fmtPct(value, digits = 3) {
      return `${(value * 100).toFixed(digits)}%`;
    }

    function fmtPp(value, digits = 3) {
      const sign = value > 0 ? "+" : "";
      return `${sign}${(value * 100).toFixed(digits)} п.п.`;
    }

    function fmtPpAbs(value, digits = 3) {
      return `${(value * 100).toFixed(digits)} п.п.`;
    }

    function fmtN(value) {
      return new Intl.NumberFormat("ru-RU").format(value);
    }

    function fmtPValue(value) {
      if (!Number.isFinite(value)) return "0";
      if (value < 0.0001) return "< 0.0001";
      return value.toFixed(4);
    }

    function fmtZ(value) {
      if (Number.isFinite(value)) return value.toFixed(4);
      return value > 0 ? "+inf" : "-inf";
    }

    function findNearest(list, target) {
      let best = list[0];
      let bestDist = Math.abs(target - best);
      for (let i = 1; i < list.length; i++) {
        const dist = Math.abs(target - list[i]);
        if (dist < bestDist) {
          best = list[i];
          bestDist = dist;
        }
      }
      return best;
    }

    function setConfidence(confidence) {
      const valid = findNearest(CONF_LEVELS, confidence);
      state.confidence = valid;
      state.alpha = Number((1 - valid / 100).toFixed(4));
    }

    function setAlpha(alpha) {
      const valid = findNearest(ALPHA_LEVELS, alpha);
      state.alpha = valid;
      state.confidence = Math.round((1 - valid) * 100);
    }

    function syncSignificanceControl() {
      const isZMode = state.mode === MODE_Z_TEST;
      const options = isZMode ? ALPHA_LEVELS : CONF_LEVELS;
      const format = isZMode
        ? (value) => `alpha=${value.toFixed(2)}`
        : (value) => `${value}%`;
      const selectedValue = isZMode ? state.alpha : state.confidence;

      ui.confidence.replaceChildren();
      for (const optionValue of options) {
        const option = document.createElement("option");
        option.value = String(optionValue);
        option.textContent = format(optionValue);
        if (optionValue === selectedValue) option.selected = true;
        ui.confidence.append(option);
      }

      ui.confidenceLabel.textContent = isZMode
        ? "Уровень значимости alpha"
        : "Уровень доверия";
    }

    function renderModeTexts() {
      const confLabel = `${state.confidence}%`;
      ui.convLegendAText.textContent = `кривая A + ${confLabel} CI`;
      ui.convLegendBText.textContent = `кривая B + ${confLabel} CI`;

      if (state.mode === MODE_Z_TEST) {
        ui.differenceTitle.textContent = "Z-распределение для проверки H0";
        ui.differenceLegendPrimary.textContent = "N(0,1) + критические области";
        ui.differenceLegendSecondary.textContent = "границы ±z* и наблюдаемое z";
      } else {
        ui.differenceTitle.textContent = "Распределение разницы (A - B)";
        ui.differenceLegendPrimary.textContent = `кривая разницы + ${confLabel} CI`;
        ui.differenceLegendSecondary.textContent = "линия нуля";
      }
    }

    function typesetMath(element) {
      if (!window.MathJax || typeof window.MathJax.typesetPromise !== "function") return;
      window.MathJax.typesetPromise([element]).catch(() => {});
    }

    function setupLinkedControl({ rangeEl, numberEl, key, integer = false }) {
      const min = Number(rangeEl.min);
      const max = Number(rangeEl.max);
      const step = Number(rangeEl.step || (integer ? 1 : 0.01));
      const precision = (String(step).split(".")[1] || "").length;

      const normalize = (raw) => {
        let value = Number(raw);
        if (!Number.isFinite(value)) value = Number(numberEl.value);
        if (!Number.isFinite(value)) value = Number(rangeEl.value);
        value = clamp(value, min, max);
        if (integer) return Math.round(value);
        return Number(value.toFixed(precision));
      };

      const apply = (raw) => {
        const value = normalize(raw);
        state[key] = value;
        rangeEl.value = String(value);
        numberEl.value = String(value);
        update();
      };

      rangeEl.addEventListener("input", (event) => apply(event.target.value));
      numberEl.addEventListener("input", (event) => apply(event.target.value));

      const initial = normalize(numberEl.value);
      state[key] = initial;
      rangeEl.value = String(initial);
      numberEl.value = String(initial);
    }

    function computeStats() {
      const pA = state.p1 / 100;
      const pB = state.p2 / 100;
      const nA = state.n1;
      const nB = state.n2;
      const z = Z_BY_CONF[state.confidence] || Z_BY_CONF[95];
      const alpha = state.alpha;

      const seA = Math.sqrt(Math.max((pA * (1 - pA)) / nA, 0));
      const seB = Math.sqrt(Math.max((pB * (1 - pB)) / nB, 0));

      const ciA = [pA - z * seA, pA + z * seA];
      const ciB = [pB - z * seB, pB + z * seB];

      const diff = pA - pB;
      const seDiff = Math.sqrt(Math.max((pA * (1 - pA)) / nA + (pB * (1 - pB)) / nB, 0));
      const ciDiff = [diff - z * seDiff, diff + z * seDiff];

      let zScore = 0;
      let pValue = 1;
      if (seDiff > 0) {
        zScore = diff / seDiff;
        pValue = clamp(2 * (1 - normalCdf(Math.abs(zScore))), 0, 1);
      } else if (Math.abs(diff) > Number.EPSILON) {
        zScore = diff > 0 ? Infinity : -Infinity;
        pValue = 0;
      }

      const significantCI = ciDiff[0] > 0 || ciDiff[1] < 0;
      const significantZTest = pValue < alpha;
      const significant = state.mode === MODE_Z_TEST ? significantZTest : significantCI;

      return {
        z,
        alpha,
        mode: state.mode,
        pA,
        pB,
        nA,
        nB,
        seA,
        seB,
        ciA,
        ciB,
        diff,
        seDiff,
        ciDiff,
        zScore,
        pValue,
        significantCI,
        significantZTest,
        significant,
        convA: Math.round(pA * nA),
        convB: Math.round(pB * nB),
      };
    }

    function drawAxes(ctx, width, height, xMin, xMax, valueFormatter) {
      const m = { left: 62, right: 20, top: 22, bottom: 34 };
      const plotW = width - m.left - m.right;
      const plotH = height - m.top - m.bottom;
      const baselineY = m.top + plotH;

      ctx.strokeStyle = "rgba(18, 32, 40, 0.16)";
      ctx.fillStyle = "rgba(18, 32, 40, 0.62)";
      ctx.lineWidth = 1;
      ctx.font = '12px "Avenir Next", "Trebuchet MS", sans-serif';
      ctx.textAlign = "center";
      ctx.textBaseline = "top";

      const ticks = 6;
      for (let i = 0; i <= ticks; i++) {
        const ratio = i / ticks;
        const xValue = xMin + ratio * (xMax - xMin);
        const xPx = m.left + ratio * plotW;

        ctx.beginPath();
        ctx.moveTo(xPx, m.top);
        ctx.lineTo(xPx, baselineY);
        ctx.stroke();

        ctx.fillText(valueFormatter(xValue), xPx, baselineY + 7);
      }

      ctx.strokeStyle = "rgba(18, 32, 40, 0.42)";
      ctx.beginPath();
      ctx.moveTo(m.left, baselineY);
      ctx.lineTo(m.left + plotW, baselineY);
      ctx.stroke();

      return {
        m,
        plotW,
        plotH,
        baselineY,
        xToPx: (x) => m.left + ((x - xMin) / (xMax - xMin)) * plotW,
      };
    }

    function drawFilledCurve(ctx, points, xToPx, yToPx, baselineY, fillStyle) {
      if (!points.length) return;
      ctx.beginPath();
      ctx.moveTo(xToPx(points[0].x), baselineY);
      for (const point of points) {
        ctx.lineTo(xToPx(point.x), yToPx(point.y));
      }
      ctx.lineTo(xToPx(points[points.length - 1].x), baselineY);
      ctx.closePath();
      ctx.fillStyle = fillStyle;
      ctx.fill();
    }

    function drawCurveLine(ctx, points, xToPx, yToPx, strokeStyle, lineWidth = 2.2) {
      if (!points.length) return;
      ctx.beginPath();
      for (let i = 0; i < points.length; i++) {
        const point = points[i];
        if (i === 0) ctx.moveTo(xToPx(point.x), yToPx(point.y));
        else ctx.lineTo(xToPx(point.x), yToPx(point.y));
      }
      ctx.strokeStyle = strokeStyle;
      ctx.lineWidth = lineWidth;
      ctx.stroke();
    }

    function resizeCanvas(canvas) {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.round(rect.width * dpr));
      canvas.height = Math.max(1, Math.round(rect.height * dpr));
      const ctx = canvas.getContext("2d");
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return { ctx, width: rect.width, height: rect.height };
    }

    function drawConversionChart(stats) {
      const { ctx, width, height } = resizeCanvas(ui.conversionsChart);
      ctx.clearRect(0, 0, width, height);

      const sigmaA = Math.max(stats.seA, 1e-6);
      const sigmaB = Math.max(stats.seB, 1e-6);

      let xMin = Math.min(stats.pA - 4 * sigmaA, stats.pB - 4 * sigmaB) - 0.01;
      let xMax = Math.max(stats.pA + 4 * sigmaA, stats.pB + 4 * sigmaB) + 0.01;
      xMin = clamp(xMin, 0, 1);
      xMax = clamp(xMax, 0, 1);

      if (xMax - xMin < 0.02) {
        const center = (stats.pA + stats.pB) / 2;
        xMin = clamp(center - 0.01, 0, 1);
        xMax = clamp(center + 0.01, 0, 1);
      }

      if (xMax <= xMin) {
        xMin = 0;
        xMax = 0.1;
      }

      const sampleCount = 420;
      const pointsA = [];
      const pointsB = [];
      let yMax = 0;

      for (let i = 0; i <= sampleCount; i++) {
        const x = xMin + (i / sampleCount) * (xMax - xMin);
        const yA = normalPdf(x, stats.pA, sigmaA);
        const yB = normalPdf(x, stats.pB, sigmaB);
        pointsA.push({ x, y: yA });
        pointsB.push({ x, y: yB });
        yMax = Math.max(yMax, yA, yB);
      }

      yMax = Math.max(yMax * 1.08, 1);

      const axis = drawAxes(
        ctx,
        width,
        height,
        xMin,
        xMax,
        (value) => `${(value * 100).toFixed(xMax - xMin < 0.08 ? 2 : 1)}%`
      );

      const yToPx = (y) => axis.m.top + axis.plotH - (y / yMax) * axis.plotH;

      const ciAStart = clamp(stats.ciA[0], xMin, xMax);
      const ciAEnd = clamp(stats.ciA[1], xMin, xMax);
      const ciBStart = clamp(stats.ciB[0], xMin, xMax);
      const ciBEnd = clamp(stats.ciB[1], xMin, xMax);

      if (ciAEnd > ciAStart) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(axis.xToPx(ciAStart), axis.m.top, axis.xToPx(ciAEnd) - axis.xToPx(ciAStart), axis.plotH);
        ctx.clip();
        drawFilledCurve(ctx, pointsA, axis.xToPx, yToPx, axis.baselineY, getComputedStyle(document.documentElement).getPropertyValue("--a-soft"));
        ctx.restore();
      }

      if (ciBEnd > ciBStart) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(axis.xToPx(ciBStart), axis.m.top, axis.xToPx(ciBEnd) - axis.xToPx(ciBStart), axis.plotH);
        ctx.clip();
        drawFilledCurve(ctx, pointsB, axis.xToPx, yToPx, axis.baselineY, getComputedStyle(document.documentElement).getPropertyValue("--b-soft"));
        ctx.restore();
      }

      drawCurveLine(ctx, pointsA, axis.xToPx, yToPx, getComputedStyle(document.documentElement).getPropertyValue("--a"));
      drawCurveLine(ctx, pointsB, axis.xToPx, yToPx, getComputedStyle(document.documentElement).getPropertyValue("--b"));

      ctx.setLineDash([6, 5]);
      ctx.lineWidth = 1.4;
      ctx.strokeStyle = "rgba(27, 127, 142, 0.72)";
      ctx.beginPath();
      ctx.moveTo(axis.xToPx(stats.pA), axis.m.top);
      ctx.lineTo(axis.xToPx(stats.pA), axis.baselineY);
      ctx.stroke();

      ctx.strokeStyle = "rgba(221, 122, 47, 0.76)";
      ctx.beginPath();
      ctx.moveTo(axis.xToPx(stats.pB), axis.m.top);
      ctx.lineTo(axis.xToPx(stats.pB), axis.baselineY);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.fillStyle = "rgba(18, 32, 40, 0.7)";
      ctx.font = '12px "Avenir Next", "Trebuchet MS", sans-serif';
      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      ctx.fillText("Конверсия", axis.m.left + 2, 5);
    }

    function drawDifferenceCIChart(stats) {
      const { ctx, width, height } = resizeCanvas(ui.differenceChart);
      ctx.clearRect(0, 0, width, height);

      const sigma = Math.max(stats.seDiff, 1e-6);
      let xMin = Math.min(stats.diff - 4 * sigma, stats.ciDiff[0], 0) - 0.003;
      let xMax = Math.max(stats.diff + 4 * sigma, stats.ciDiff[1], 0) + 0.003;

      if (xMax - xMin < 0.008) {
        xMin = stats.diff - 0.004;
        xMax = stats.diff + 0.004;
      }

      const sampleCount = 420;
      const points = [];
      let yMax = 0;

      for (let i = 0; i <= sampleCount; i++) {
        const x = xMin + (i / sampleCount) * (xMax - xMin);
        const y = normalPdf(x, stats.diff, sigma);
        points.push({ x, y });
        yMax = Math.max(yMax, y);
      }

      yMax = Math.max(yMax * 1.08, 1);

      const axis = drawAxes(
        ctx,
        width,
        height,
        xMin,
        xMax,
        (value) => {
          const sign = value > 0 ? "+" : "";
          const digits = xMax - xMin < 0.08 ? 2 : 1;
          return `${sign}${(value * 100).toFixed(digits)} п.п.`;
        }
      );

      const yToPx = (y) => axis.m.top + axis.plotH - (y / yMax) * axis.plotH;

      const ciStart = clamp(stats.ciDiff[0], xMin, xMax);
      const ciEnd = clamp(stats.ciDiff[1], xMin, xMax);
      if (ciEnd > ciStart) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(axis.xToPx(ciStart), axis.m.top, axis.xToPx(ciEnd) - axis.xToPx(ciStart), axis.plotH);
        ctx.clip();
        drawFilledCurve(ctx, points, axis.xToPx, yToPx, axis.baselineY, getComputedStyle(document.documentElement).getPropertyValue("--d-soft"));
        ctx.restore();
      }

      drawCurveLine(ctx, points, axis.xToPx, yToPx, getComputedStyle(document.documentElement).getPropertyValue("--d"));

      ctx.setLineDash([7, 4]);
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = "rgba(196, 70, 47, 0.95)";
      ctx.beginPath();
      ctx.moveTo(axis.xToPx(0), axis.m.top);
      ctx.lineTo(axis.xToPx(0), axis.baselineY);
      ctx.stroke();

      ctx.strokeStyle = "rgba(15, 95, 82, 0.75)";
      ctx.beginPath();
      ctx.moveTo(axis.xToPx(stats.diff), axis.m.top);
      ctx.lineTo(axis.xToPx(stats.diff), axis.baselineY);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.fillStyle = "rgba(18, 32, 40, 0.7)";
      ctx.font = '12px "Avenir Next", "Trebuchet MS", sans-serif';
      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      ctx.fillText("Разница A - B (п.п.)", axis.m.left + 2, 5);
    }

    function drawDifferenceZChart(stats) {
      const { ctx, width, height } = resizeCanvas(ui.differenceChart);
      ctx.clearRect(0, 0, width, height);

      const observedAbs = Number.isFinite(stats.zScore) ? Math.abs(stats.zScore) : stats.z + 1.5;
      const edge = clamp(Math.max(4, stats.z + 1.2, observedAbs + 0.9), 4, 12);
      const xMin = -edge;
      const xMax = edge;

      const sampleCount = 420;
      const points = [];
      let yMax = 0;

      for (let i = 0; i <= sampleCount; i++) {
        const x = xMin + (i / sampleCount) * (xMax - xMin);
        const y = normalPdf(x, 0, 1);
        points.push({ x, y });
        yMax = Math.max(yMax, y);
      }

      yMax = Math.max(yMax * 1.08, 1);

      const axis = drawAxes(
        ctx,
        width,
        height,
        xMin,
        xMax,
        (value) => value.toFixed(edge < 8 ? 1 : 0)
      );

      const yToPx = (y) => axis.m.top + axis.plotH - (y / yMax) * axis.plotH;
      const zCriticalLeft = -stats.z;
      const zCriticalRight = stats.z;

      if (zCriticalLeft > xMin) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(axis.xToPx(xMin), axis.m.top, axis.xToPx(zCriticalLeft) - axis.xToPx(xMin), axis.plotH);
        ctx.clip();
        drawFilledCurve(ctx, points, axis.xToPx, yToPx, axis.baselineY, "rgba(196, 70, 47, 0.2)");
        ctx.restore();
      }

      if (zCriticalRight < xMax) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(axis.xToPx(zCriticalRight), axis.m.top, axis.xToPx(xMax) - axis.xToPx(zCriticalRight), axis.plotH);
        ctx.clip();
        drawFilledCurve(ctx, points, axis.xToPx, yToPx, axis.baselineY, "rgba(196, 70, 47, 0.2)");
        ctx.restore();
      }

      drawCurveLine(ctx, points, axis.xToPx, yToPx, getComputedStyle(document.documentElement).getPropertyValue("--d"));

      ctx.setLineDash([4, 4]);
      ctx.lineWidth = 1.2;
      ctx.strokeStyle = "rgba(18, 32, 40, 0.45)";
      ctx.beginPath();
      ctx.moveTo(axis.xToPx(0), axis.m.top);
      ctx.lineTo(axis.xToPx(0), axis.baselineY);
      ctx.stroke();

      ctx.setLineDash([7, 4]);
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = "rgba(196, 70, 47, 0.95)";
      ctx.beginPath();
      ctx.moveTo(axis.xToPx(zCriticalLeft), axis.m.top);
      ctx.lineTo(axis.xToPx(zCriticalLeft), axis.baselineY);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(axis.xToPx(zCriticalRight), axis.m.top);
      ctx.lineTo(axis.xToPx(zCriticalRight), axis.baselineY);
      ctx.stroke();

      const observedX = Number.isFinite(stats.zScore)
        ? clamp(stats.zScore, xMin, xMax)
        : (stats.zScore >= 0 ? xMax : xMin);

      ctx.setLineDash([]);
      ctx.lineWidth = 1.8;
      ctx.strokeStyle = "rgba(15, 95, 82, 0.82)";
      ctx.beginPath();
      ctx.moveTo(axis.xToPx(observedX), axis.m.top);
      ctx.lineTo(axis.xToPx(observedX), axis.baselineY);
      ctx.stroke();

      ctx.fillStyle = "rgba(18, 32, 40, 0.7)";
      ctx.font = '12px "Avenir Next", "Trebuchet MS", sans-serif';
      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      ctx.fillText("Z-статистика", axis.m.left + 2, 5);

      ctx.textAlign = "right";
      ctx.fillText(`z=${fmtZ(stats.zScore)}, p=${fmtPValue(stats.pValue)}`, width - axis.m.right, 5);
    }

    function drawDifferenceChart(stats) {
      if (state.mode === MODE_Z_TEST) {
        drawDifferenceZChart(stats);
        return;
      }
      drawDifferenceCIChart(stats);
    }

    function renderStats(stats) {
      syncSignificanceControl();
      renderModeTexts();
      const confLabel = `${state.confidence}%`;

      ui.meanA.textContent = fmtPct(stats.pA);
      ui.ciA.textContent = `${confLabel} CI: [${fmtPct(stats.ciA[0])}; ${fmtPct(stats.ciA[1])}]`;
      ui.sampleA.textContent = `SE=${fmtPct(stats.seA)} | конверсий ≈ ${fmtN(stats.convA)} из ${fmtN(stats.nA)}`;

      ui.meanB.textContent = fmtPct(stats.pB);
      ui.ciB.textContent = `${confLabel} CI: [${fmtPct(stats.ciB[0])}; ${fmtPct(stats.ciB[1])}]`;
      ui.sampleB.textContent = `SE=${fmtPct(stats.seB)} | конверсий ≈ ${fmtN(stats.convB)} из ${fmtN(stats.nB)}`;

      ui.diffValue.textContent = fmtPp(stats.diff);
      if (state.mode === MODE_Z_TEST) {
        ui.ciDiff.textContent = `SE(diff)=${fmtPpAbs(stats.seDiff)}`;
        ui.zAndP.textContent = `z = ${fmtZ(stats.zScore)}, p-value = ${fmtPValue(stats.pValue)}`;
      } else {
        ui.ciDiff.textContent = `${confLabel} CI: [${fmtPp(stats.ciDiff[0])}; ${fmtPp(stats.ciDiff[1])}]`;
        ui.zAndP.textContent = "";
      }

      if (stats.significant) {
        ui.hypothesis.textContent = "H0 отвергается";
        ui.hypothesis.classList.remove("bad");
        ui.hypothesis.classList.add("ok");
        if (state.mode === MODE_Z_TEST) {
          ui.hypothesisText.textContent = `p-value = ${fmtPValue(stats.pValue)} < alpha = ${stats.alpha.toFixed(4)}. Изменение статистически значимо.`;
        } else {
          ui.hypothesisText.textContent = "0 не попадает в CI разницы. Изменение статистически значимо.";
        }
      } else {
        ui.hypothesis.textContent = "Нет оснований отвергнуть H0";
        ui.hypothesis.classList.remove("ok");
        ui.hypothesis.classList.add("bad");
        if (state.mode === MODE_Z_TEST) {
          ui.hypothesisText.textContent = `p-value = ${fmtPValue(stats.pValue)} >= alpha = ${stats.alpha.toFixed(4)}. Статзначимость не подтверждена.`;
        } else {
          ui.hypothesisText.textContent = "0 попадает в CI разницы. Статзначимость не подтверждена.";
        }
      }

      if (state.mode === MODE_Z_TEST) {
        const zAbs = Number.isFinite(stats.zScore) ? Math.abs(stats.zScore) : Infinity;
        const zCompare = zAbs > stats.z ? ">" : "<=";
        const confidenceHint = Number.isFinite(stats.pValue)
          ? `${((1 - stats.pValue) * 100).toFixed(2)}%`
          : "100.00%";
        const incompatibilityText = Number.isFinite(stats.pValue)
          ? `Если повторять эксперимент при верной \\(H_0\\), в среднем в ${(stats.pValue * 100).toFixed(2)}% случаев можно получить такое же или более экстремальное отклонение случайно.`
          : "Полученное отклонение настолько велико, что \\(p\\)-value численно стремится к нулю.";
        ui.differenceExplanation.innerHTML = [
          `<p>\\(SE_{A-B}=\\sqrt{\\frac{p_A(1-p_A)}{n_A}+\\frac{p_B(1-p_B)}{n_B}}=${(stats.seDiff * 100).toFixed(4)}\\text{ п.п.}\\)</p>`,
          `<p>\\(z=\\frac{(A-B)}{SE_{A-B}}=\\frac{${(stats.diff * 100).toFixed(4)}\\text{ п.п.}}{${(stats.seDiff * 100).toFixed(4)}\\text{ п.п.}}=${fmtZ(stats.zScore)}\\)</p>`,
          `<p>Проверка критерия: \\(|z| ${zCompare} z^*=${stats.z.toFixed(4)}\\), где \\(\\alpha=${stats.alpha.toFixed(4)}\\).</p>`,
          `<p>\\(p\\text{-value}=${fmtPValue(stats.pValue)}\\). ${incompatibilityText}</p>`,
          `<p>\\(1-p\\approx ${confidenceHint}\\) можно использовать только как грубый индикатор силы несовместимости данных с \\(H_0\\), но не как вероятность истинности или ложности \\(H_0\\).</p>`,
        ].join("");
      } else {
        const zeroInsideCI = stats.ciDiff[0] <= 0 && stats.ciDiff[1] >= 0;
        const decisionText = zeroInsideCI
          ? "Ноль (красный пунктир) попадает в закрашенный интервал, поэтому оснований отвергнуть \\(H_0\\) нет."
          : "Ноль (красный пунктир) не попадает в закрашенный интервал, поэтому \\(H_0\\) отвергается.";
        const verdictHtml = zeroInsideCI
          ? "<strong><u>Итог: нулевая гипотеза не отвергается.</u></strong>"
          : "<strong><u>Итог: нулевая гипотеза отвергается.</u></strong>";
        ui.differenceExplanation.innerHTML = [
          `<p>При уровне доверия ${confLabel} доверительный интервал для разницы: \\(CI_{A-B}=[${(stats.ciDiff[0] * 100).toFixed(3)};\\ ${(stats.ciDiff[1] * 100).toFixed(3)}]\\text{ п.п.}\\).</p>`,
          `<p>${decisionText}</p>`,
          `<p>${verdictHtml}</p>`,
        ].join("");
      }

      typesetMath(ui.differenceExplanation);
    }

    function update() {
      const stats = computeStats();
      renderStats(stats);
      drawConversionChart(stats);
      drawDifferenceChart(stats);
    }

    setupLinkedControl({ rangeEl: ui.p1Range, numberEl: ui.p1Number, key: "p1" });
    setupLinkedControl({ rangeEl: ui.n1Range, numberEl: ui.n1Number, key: "n1", integer: true });
    setupLinkedControl({ rangeEl: ui.p2Range, numberEl: ui.p2Number, key: "p2" });
    setupLinkedControl({ rangeEl: ui.n2Range, numberEl: ui.n2Number, key: "n2", integer: true });

    ui.confidence.addEventListener("input", (event) => {
      const value = Number(event.target.value);
      if (state.mode === MODE_Z_TEST) {
        setAlpha(value);
      } else {
        setConfidence(value);
      }
      update();
    });

    ui.inferenceMode.addEventListener("input", (event) => {
      state.mode = event.target.value === MODE_Z_TEST ? MODE_Z_TEST : MODE_CI;
      if (state.mode === MODE_Z_TEST) {
        setAlpha(state.alpha);
      } else {
        setConfidence(state.confidence);
      }
      update();
    });

    state.mode = ui.inferenceMode.value === MODE_Z_TEST ? MODE_Z_TEST : MODE_CI;
    if (state.mode === MODE_Z_TEST) {
      setAlpha(state.alpha);
    } else {
      setConfidence(Number(ui.confidence.value));
    }

    window.addEventListener("resize", update);
    update();
  </script>
</body>
</html>
